version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pricepilot_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pricepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pricepilot_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: pricepilot_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/pricepilot?sslmode=disable
      - REDIS_URL=redis:6379
    depends_on:
      - postgres
      - redis
      - meilisearch

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: pricepilot_search
    restart: always
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=masterKey
    volumes:
      - meili_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  meili_data:

name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/build-android-apk.yml"

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Normalize Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ] && [ -n "$EAS_TOKEN" ]; then
            echo "EXPO_TOKEN=$EAS_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: Validate Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Expo token secret is missing."
            echo "Add EXPO_TOKEN or EAS_TOKEN in GitHub: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN != '' && secrets.EXPO_TOKEN || secrets.EAS_TOKEN }}

      - name: Build APK (EAS Cloud)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN != '' && secrets.EXPO_TOKEN || secrets.EAS_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive --wait

      - name: Build artifact hint
        run: |
          echo "Build finished. Download the APK from the EAS build URL shown above."

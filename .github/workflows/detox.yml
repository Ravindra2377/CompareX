name: Detox E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  detox-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN || vars.EXPO_TOKEN }}
      NODE_OPTIONS: --experimental-vm-modules
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ runner.os }}-api30

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libpulse0 libglu1-mesa

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps --prefer-offline --no-audit

      - name: Generate Native Android Directory
        working-directory: frontend
        run: npx expo prebuild --platform android --non-interactive

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Detox Tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          NODE_OPTIONS: --experimental-vm-modules
          CI: 1
          REACT_NATIVE_PACKAGER_HOSTNAME: 127.0.0.1
          EXPO_PACKAGER_HOSTNAME: 127.0.0.1
          ORG_GRADLE_PROJECT_reactNativeArchitectures: x86_64
          ORG_GRADLE_PROJECT_newArchEnabled: false
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"
        with:
          api-level: 30
          arch: x86_64
          avd-name: Pixel_3a_API_30_x86
          force-avd-creation: false
          disable-animations: true
          # Direct hardware flags for guaranteed RAM allocation
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -accel off -memory 4096 -cores 2
          # Give the emulator extra time to cold-boot on GitHub runners (ms)
          emulator-boot-timeout: 600000
          script: |
            # Wait for emulator to be fully booted (poll sys.boot_completed)
            echo "Waiting for emulator to finish booting (up to 10m)..."
            BOOT_TIMEOUT=600
            BOOT_END=$((SECONDS + BOOT_TIMEOUT))
            EMULATOR_SERIAL=""
            BOOTED=0
            while [ $SECONDS -lt $BOOT_END ]; do
              EMULATOR_SERIAL=$(adb devices | awk '/emulator-/{print $1; exit}') || true
              if [ -n "$EMULATOR_SERIAL" ]; then
                BOOTED_FLAG=$(adb -s $EMULATOR_SERIAL shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
                if [ "$BOOTED_FLAG" = "1" ]; then
                  echo "Emulator $EMULATOR_SERIAL booted"
                  BOOTED=1
                  break
                fi
              fi
              echo "Emulator not ready yet... sleeping 5s"
              sleep 5
            done
            if [ $BOOTED -ne 1 ]; then
              echo "Emulator failed to boot within ${BOOT_TIMEOUT}s"
              adb devices || true
              exit 1
            fi

            # Perform device setup once emulator is ready
            echo "Performing device setup on $EMULATOR_SERIAL"
            adb -s $EMULATOR_SERIAL shell am force-stop com.google.android.gms || true
            adb -s $EMULATOR_SERIAL shell settings put global show_error_dialogs 0 || true
            adb -s $EMULATOR_SERIAL shell settings put global show_annoying_app_errors 0 || true
            adb -s $EMULATOR_SERIAL shell input keyevent 82 || true
            adb -s $EMULATOR_SERIAL shell wm dismiss-keyguard || true
            adb -s $EMULATOR_SERIAL shell input keyevent 3 || true
            adb -s $EMULATOR_SERIAL shell settings put global window_animation_scale 0.0 || true
            adb -s $EMULATOR_SERIAL shell settings put global transition_animation_scale 0.0 || true
            adb -s $EMULATOR_SERIAL shell settings put global animator_duration_scale 0.0 || true

            # Start Metro, build and run Detox
            if [ -d "frontend" ]; then
              cd frontend
            fi
            adb reverse tcp:8081 tcp:8081 || true
            (npx expo start --no-dev --host localhost &) || true
            # Wait for Metro to serve and for the packager to be reachable
            npx wait-on http://localhost:8081 --timeout 600000
            npm run detox-build
            # Short sleep to let install settle before tests
            sleep 15
            npm run detox-test

      - name: Upload Detox artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: frontend/e2e/artifacts

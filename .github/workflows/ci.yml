name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Backend — Go build, lint & test
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -v -race -count=1 -timeout 120s ./...

      - name: Vet (static analysis)
        run: go vet ./...

  # ─────────────────────────────────────────────
  # Frontend — Node lint & test
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (React Native)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          npx jest --ci --forceExit --detectOpenHandles --passWithNoTests \
            --testPathIgnorePatterns='e2e/'

      - name: Run tests with coverage
        run: |
          npx jest --ci --forceExit --detectOpenHandles --passWithNoTests \
            --testPathIgnorePatterns='e2e/' --coverage
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Status gate — both jobs must pass
  # ─────────────────────────────────────────────
  ci-passed:
    name: CI ✅
    if: always()
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "❌ One or more CI jobs failed."
            echo "   Backend:  ${{ needs.backend.result }}"
            echo "   Frontend: ${{ needs.frontend.result }}"
            exit 1
          fi
          echo "✅ All CI checks passed!"
